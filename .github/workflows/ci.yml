name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lint
        run: python3 scripts/lint.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Grade committed eval snapshots
        run: python3 scripts/eval-grade.py

      - name: Hook functional smoke
        run: bash tests/sh/test_hook_smoke.sh
