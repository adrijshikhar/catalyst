<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Catalyst">
  <defs>
    <linearGradient id="cat1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F8CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- C-shaped reaction pathway, open on the right -->
  <path d="M74 30 A32 32 0 1 0 74 70" fill="none" stroke="url(#cat1)" stroke-width="11" stroke-linecap="round"/>
  <!-- catalyst node at the active gap -->
  <circle cx="70" cy="50" r="8" fill="url(#cat1)"/>
  <!-- acceleration sparks leaving the node -->
  <g stroke="url(#cat1)" stroke-width="4.5" stroke-linecap="round">
    <path d="M82 50 h11"/>
    <path d="M80 41 l9 -5"/>
    <path d="M80 59 l9 5"/>
  </g>
</svg>
