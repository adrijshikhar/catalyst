<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Catalyst">
  <defs>
    <linearGradient id="cat6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F8CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- cyclic arrow: catalyst regenerated, not consumed -->
  <path d="M68 24 A32 32 0 1 1 24 38" fill="none" stroke="url(#cat6)" stroke-width="9" stroke-linecap="round"/>
  <!-- arrowhead closing the loop -->
  <path d="M68 24 L57 22 M68 24 L67 35" fill="none" stroke="url(#cat6)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- catalyst node on the path -->
  <circle cx="50" cy="50" r="11" fill="url(#cat6)"/>
  <circle cx="50" cy="50" r="4.5" fill="#fff"/>
</svg>
